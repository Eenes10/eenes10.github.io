<!doctype html>
<html lang="tr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Trigonometrik Değer Hesaplayıcı</title>

<style>
:root{
  --accent:#6c74ff;
  --accent2:#34d399;
  --bg1:#e6f2ff;
  --bg2:#bfdcff;
  --card:#ffffff;
  --shadow:0 18px 40px rgba(0,0,0,.12);
}

*{
  box-sizing:border-box;
  font-family:system-ui,-apple-system,BlinkMacSystemFont;
}

body{
  margin:0;
  min-height:100vh;
  background:linear-gradient(160deg,var(--bg1),var(--bg2));
  display:flex;
  align-items:center;
  justify-content:center;
}

.container{
  width:760px;
  max-width:95%;
  background:var(--card);
  border-radius:16px;
  box-shadow:var(--shadow);
  padding:20px;
}

header{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

h1{
  margin:0;
  font-size:18px;
}

.funcs{
  margin-top:12px;
}

.btn{
  padding:8px 14px;
  border-radius:10px;
  border:0;
  background:#f1f4ff;
  cursor:pointer;
  font-weight:700;
}

.btn.active{
  background:var(--accent);
  color:#fff;
}

canvas{
  width:100%;
  height:240px;
  background:#eef5ff;
  border-radius:10px;
  margin-top:14px;
}

input{
  width:100%;
  padding:10px;
  margin-top:12px;
  border-radius:10px;
  border:1px solid #ddd;
}

.calc-btn{
  margin-top:12px;
  width:100%;
  padding:12px;
  border-radius:12px;
  border:0;
  background:linear-gradient(90deg,var(--accent2),#0fb07b);
  color:#fff;
  font-weight:800;
  cursor:pointer;
}

.result{
  margin-top:14px;
  padding:12px;
  background:#f8faff;
  border-radius:10px;
}

.small{
  font-size:13px;
  opacity:.75;
}
</style>
</head>

<body>

<div class="container">

<header>
  <h1>Trigonometrik Değer Hesaplayıcı</h1>
</header>

<div class="funcs">
  <button class="btn active" data-f="sin">sin</button>
  <button class="btn" data-f="cos">cos</button>
  <button class="btn" data-f="tan">tan</button>
</div>

<canvas id="plot"></canvas>

<input id="angle" type="number" value="30" placeholder="Açı (derece)">

<button id="calc" class="calc-btn">Hesapla</button>

<div class="result">
  <div id="exact" class="small">—</div>
  <div id="approx">Sonuç burada</div>
</div>

</div>

<script>
/* =======================
   DEĞİŞKENLER
======================= */
const buttons = document.querySelectorAll('[data-f]');
const angleInput = document.getElementById('angle');
const calcBtn = document.getElementById('calc');
const exactEl = document.getElementById('exact');
const approxEl = document.getElementById('approx');
const canvas = document.getElementById('plot');
const ctx = canvas.getContext('2d');

let currentFunc = 'sin';

/* =======================
   KESİN DEĞER TABLOSU
======================= */
const exactMap = {
  sin:{0:'0',30:'1/2',45:'√2/2',60:'√3/2',90:'1'},
  cos:{0:'1',30:'√3/2',45:'√2/2',60:'1/2',90:'0'},
  tan:{0:'0',30:'1/√3',45:'1',60:'√3'}
};

/* =======================
   BUTON SEÇİMİ
======================= */
buttons.forEach(b=>{
  b.onclick=()=>{
    buttons.forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    currentFunc=b.dataset.f;
    drawGraph();
  };
});

/* =======================
   HESAPLAMA
======================= */
calcBtn.onclick=()=>{
  const deg=Number(angleInput.value);
  const rad=deg*Math.PI/180;

  let val;
  if(currentFunc==='sin') val=Math.sin(rad);
  if(currentFunc==='cos') val=Math.cos(rad);
  if(currentFunc==='tan') val=Math.tan(rad);

  exactEl.textContent =
    exactMap[currentFunc][deg] ?? `${currentFunc}(${deg}°)`;

  approxEl.textContent =
    isFinite(val) ? val.toFixed(6) : 'Tanımsız';
};

/* =======================
   GRAFİK
======================= */
function drawGraph(){
  canvas.width=canvas.clientWidth;
  canvas.height=240;
  ctx.clearRect(0,0,canvas.width,canvas.height);

  ctx.beginPath();

  for(let x=0;x<=360;x++){
    const r=x*Math.PI/180;
    let y=Math.sin(r);
    if(currentFunc==='cos') y=Math.cos(r);
    if(currentFunc==='tan') y=Math.tan(r)/5;

    const px=(x/360)*canvas.width;
    const py=120-y*100;

    x===0 ? ctx.moveTo(px,py) : ctx.lineTo(px,py);
  }

  ctx.strokeStyle='#6c74ff';
  ctx.lineWidth=2;
  ctx.stroke();
}

drawGraph();
</script>

</body>
</html>
