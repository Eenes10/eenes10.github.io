<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>EnesBlast</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header>
    <h1>EnesBlast</h1>
    <p class="subtitle">Satırları ve sütunları temizle</p>
  </header>

  <main class="game-wrapper">
    <aside class="side-panel">
      <div class="score-box">
        <div class="label">Puan</div>
        <div class="value" id="score">0</div>
      </div>
      <div class="score-box best">
        <div class="label">En İyi</div>
        <div class="value" id="best">0</div>
      </div>
      <div class="combo-badge" id="combo">✨ Temizlendi!</div>
      <button class="btn" id="restartBtn">↺ Yeniden</button>
    </aside>

    <section class="board-container">
      <div id="board"></div>
      <div class="pieces-tray" id="tray"></div>
    </section>
  </main>

  <!-- Sürükleme ghost -->
  <div id="ghost" class="drag-ghost"></div>

  <!-- Oyun bitti overlay -->
  <div class="overlay" id="overlay">
    <div class="overlay-card">
      <h2>Oyun Bitti!</h2>
      <div class="final-score" id="finalScore">0</div>
      <p>Hiçbir parça sığmıyor.</p>
      <button class="btn" id="overlayRestartBtn">Tekrar Oyna</button>
    </div>
  </div>

  <!-- Instagram butonu (sağ alt) -->
  <a class="ig-btn" href="https://www.instagram.com/enesyavuz07/" target="_blank" rel="noopener" aria-label="Instagram">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/>
      <circle cx="12" cy="12" r="4.5"/>
      <circle cx="17.5" cy="6.5" r="0.8" fill="currentColor" stroke="none"/>
    </svg>
    <span>@enesyavuz07</span>
  </a>

  <script src="game.js"></script>
</body>
</html>
