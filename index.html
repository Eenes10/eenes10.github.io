<!doctype html>
<html lang="tr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Trigonometrik Değer Hesaplayıcı</title>

<!-- GITHUB PAGES UYUMLU -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#6c74ff">

<style>
/* ===== SENİN TÜM CSS KODUN ===== */
:root{
  --card-w:760px;
  --accent1:#6c74ff;
  --accent2:#34d399;
  --bg1:#e6f2ff;
  --bg2:#bfe0ff;
  --glass: rgba(255,255,255,0.88);
  --muted:#445a78;
  --shadow: 0 18px 40px rgba(13,38,76,0.12);
  --spot-x:50%;
  --spot-y:50%;
  --spot-size:220px;
  --spot-intensity:1;
}

*{box-sizing:border-box;font-family:Inter,system-ui}
html,body{height:100%;margin:0}
body{
  background:linear-gradient(160deg,var(--bg1),var(--bg2));
  display:flex;
  align-items:center;
  justify-content:center;
  padding:28px;
  overflow:hidden;
}

/* GRID */
.bg-grid{
  position:fixed;
  inset:0;
  opacity:.28;
  pointer-events:none;
  background-image:
    repeating-linear-gradient(0deg,rgba(0,0,0,.04) 0 1px,transparent 1px 28px),
    repeating-linear-gradient(90deg,rgba(0,0,0,.03) 0 1px,transparent 1px 28px);
}

/* SPOT */
.spot{
  position:fixed;
  inset:0;
  pointer-events:none;
  mix-blend-mode:screen;
  background:
    radial-gradient(circle var(--spot-size) at var(--spot-x) var(--spot-y),
    rgba(255,255,255,.4),transparent 70%);
}

.container{
  position:relative;
  width:var(--card-w);
  padding:18px;
  border-radius:14px;
  background:var(--glass);
  box-shadow:var(--shadow);
  z-index:2;
}

h1{margin:0;font-size:18px;font-weight:800}

.btn{
  padding:8px 12px;
  border-radius:10px;
  border:0;
  background:#f6f9ff;
  cursor:pointer;
  font-weight:700;
}

.btn.active{
  background:linear-gradient(90deg,var(--accent1),#8a90ff);
  color:white;
}

.calc-btn{
  padding:12px;
  background:linear-gradient(90deg,var(--accent2),#0fb07b);
  color:white;
  border-radius:12px;
  border:0;
  font-weight:800;
  cursor:pointer;
}

.result{
  margin-top:12px;
  padding:12px;
  border-radius:12px;
  background:#fff;
}

canvas{
  width:100%;
  height:240px;
  background:#eef8ff;
  border-radius:8px;
}
</style>
</head>

<body>

<div class="bg-grid"></div>
<div class="spot" id="spot"></div>

<div class="container">

<header style="display:flex;justify-content:space-between;align-items:center">
<h1>Trigonometrik Değer Hesaplayıcı</h1>
<button id="themeToggle" class="btn">🌙</button>
</header>

<div style="margin-top:12px">
<button class="btn active" data-f="sin">sin</button>
<button class="btn" data-f="cos">cos</button>
<button class="btn" data-f="tan">tan</button>
</div>

<canvas id="plotCanvas"></canvas>

<div style="margin-top:12px">
<input id="angle" type="number" value="30">
<button class="calc-btn" id="calcBtn">Hesapla</button>
</div>

<div class="result">
<div id="exact">—</div>
<div id="approx">Sonuç burada</div>
</div>

</div>

<!-- INSTAGRAM -->
<a href="https://www.instagram.com/enesyavuz07" target="_blank"
style="position:fixed;bottom:24px;right:24px;
width:45px;height:45px;border-radius:50%;
display:flex;align-items:center;justify-content:center;
background:rgba(108,116,255,.6);color:white;
text-decoration:none;font-weight:900">
IG
</a>

<script>
/* ===== HESAPLAMA ===== */
let currentFunc="sin";

document.querySelectorAll("[data-f]").forEach(b=>{
  b.onclick=()=>{
    document.querySelectorAll("[data-f]").forEach(x=>x.classList.remove("active"));
    b.classList.add("active");
    currentFunc=b.dataset.f;
    draw();
  }
});

document.getElementById("calcBtn").onclick=()=>{
  const a=Number(angle.value)*Math.PI/180;
  let r=0;
  if(currentFunc==="sin")r=Math.sin(a);
  if(currentFunc==="cos")r=Math.cos(a);
  if(currentFunc==="tan")r=Math.tan(a);
  approx.textContent=r.toFixed(6);
};

/* ===== GRAFİK ===== */
const c=plotCanvas.getContext("2d");
function draw(){
  c.clearRect(0,0,plotCanvas.width,plotCanvas.height);
  c.beginPath();
  for(let x=0;x<360;x++){
    let rad=x*Math.PI/180;
    let y=Math.sin(rad);
    c.lineTo(x,120-100*y);
  }
  c.stroke();
}
draw();

/* ===== SPOT ===== */
document.addEventListener("mousemove",e=>{
  spot.style.setProperty("--spot-x",e.clientX+"px");
  spot.style.setProperty("--spot-y",e.clientY+"px");
});

/* ===== THEME ===== */
themeToggle.onclick=()=>{
  document.documentElement.classList.toggle("dark");
};

/* ===== SERVICE WORKER ===== */
if("serviceWorker"in navigator){
  navigator.serviceWorker.register("service-worker.js");
}
</script>

</body>
</html>
