<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>ig:Enesyavuz07</title>
<link rel="manifest" href="/manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --card-w:760px;
  --accent1:#6c74ff;
  --accent2:#34d399;
  --bg1:#e6f2ff;
  --bg2:#bfe0ff;
  --glass: rgba(255,255,255,0.88);
  --muted:#445a78;
  --shadow:0 18px 40px rgba(13,38,76,0.12);
}

/* Base styles */
*{box-sizing:border-box;font-family:Inter,system-ui,Segoe UI,Arial,Helvetica,sans-serif;}
html,body{height:100%;margin:0;overflow:hidden;}
body{
  background: linear-gradient(-45deg,var(--bg1),var(--bg2),#d0e6ff,#c8e2ff);
  background-size: 400% 400%;
  animation: gradientBG 20s ease infinite;
  display:flex;align-items:center;justify-content:center;padding:28px;color:#07204a;
  transition: background .25s ease,color .25s ease;
}

@keyframes gradientBG{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

/* Glass container */
.container{
  position:relative; z-index:2; width:var(--card-w); padding:20px; border-radius:20px;
  background: var(--glass); backdrop-filter: blur(12px) saturate(150%);
  box-shadow:var(--shadow); transition:background .3s, box-shadow .3s;
  transform-style: preserve-3d;
}

/* Header */
header{display:flex;justify-content:space-between;align-items:center;gap:12px;}
h1{font-size:20px;font-weight:800;margin:0;}
.controls .btn{transition: transform .2s, box-shadow .2s;}
.controls .btn:hover{transform:translateY(-3px) scale(1.05); box-shadow:0 10px 30px rgba(0,0,0,0.3);}

/* Buttons */
.btn{
  display:inline-flex; align-items:center; justify-content:center;
  gap:8px; padding:10px 16px; border-radius:12px; border:0; background:#f6f9ff;
  cursor:pointer; font-weight:700; box-shadow:0 6px 18px rgba(10,20,40,0.05);
  transition: all .25s ease;
}
.btn:hover{transform: translateY(-3px) scale(1.05); box-shadow:0 12px 30px rgba(108,116,255,0.2);}
.btn.active{background: linear-gradient(90deg,var(--accent1),var(--accent2)); color:white; box-shadow:0 14px 40px rgba(106,115,255,0.16);}

/* Main layout */
.main{display:grid;grid-template-columns:1fr 320px;gap:16px;align-items:start; perspective:1000px;}
.plot-card{border-radius:16px;padding:12px;background:linear-gradient(180deg,#fff,#f8fbff); box-shadow:inset 0 1px 0 rgba(255,255,255,0.6); transition: transform .25s ease, box-shadow .25s ease;}
.plot-card:hover{transform: translateY(-6px) rotateX(2deg) rotateY(2deg); box-shadow:0 20px 60px rgba(0,0,0,0.2);}
canvas{width:100%;height:240px;border-radius:12px;background:linear-gradient(180deg,#fbfdff,#eef8ff);display:block;}

/* Side panel */
.side{display:flex;flex-direction:column;gap:12px; transform-style: preserve-3d;}
.calc-btn{flex:1;padding:12px;border-radius:12px;border:0;background:linear-gradient(90deg,var(--accent2),#0fb07b);color:white;font-weight:800;cursor:pointer; transition: transform .2s, box-shadow .2s;}
.calc-btn:hover{transform: translateY(-3px) scale(1.03); box-shadow:0 16px 40px rgba(15,176,123,0.25);}

/* Result box */
.result{border-radius:12px;padding:12px;background:linear-gradient(180deg,#fff,#f7fbff); min-height:72px; display:flex; flex-direction:column; gap:6px; transition: transform .2s;}
.result.pulse{animation:pulse 1.2s ease-in-out;}
@keyframes pulse{0%{transform:scale(1);}50%{transform:scale(1.02); box-shadow:0 18px 40px rgba(100,116,255,0.08);}100%{transform:scale(1);}}

.field{display:flex;gap:8px;align-items:center;margin-top:8px;}
input[type=number]{padding:10px 12px;border-radius:12px;border:1px solid #d6e7ff;width:140px;transition: transform .2s, box-shadow .2s;}
input[type=number]:focus{transform:scale(1.03); box-shadow:0 8px 30px rgba(108,116,255,0.15); outline:none;}

/* Spotlight particle */
.spot{
  position:fixed; left:0; top:0; width:100%; height:100%; pointer-events:none; mix-blend-mode:screen; z-index:1;
  transition: opacity .25s, transform .24s;
  opacity:1; filter:blur(15px) saturate(150%);
  background:
    radial-gradient(circle 200px at var(--spot-x) var(--spot-y), rgba(255,255,255,0.35) 0%, transparent 80%);
}

/* Background grid */
.bg-grid{
  position:fixed; inset:0; z-index:0; pointer-events:none;
  background-image: repeating-linear-gradient(0deg, rgba(10,20,40,0.03) 0 1px, transparent 1px 28px),
                    repeating-linear-gradient(90deg, rgba(10,20,40,0.03) 0 1px, transparent 1px 28px);
  background-size: 100% 100%;
  animation: gridPan 40s linear infinite;
}
@keyframes gridPan{from{background-position:0 0}to{background-position:400px 400px}}

/* Dark mode */
.dark body{background: linear-gradient(135deg,#071428,#0b2a41,#001b33,#0a2741); color:#cfe9ff;}
.dark .container{background: rgba(6,12,30,0.72); box-shadow: 0 18px 40px rgba(0,0,0,0.6);}
.dark .plot-card{background:linear-gradient(180deg,#071428,#042033);}
.dark .result{background: linear-gradient(180deg,#071a2b,#042033); border:1px solid rgba(255,255,255,0.03);}
.dark .btn{background:#071428; color:#cfe9ff; box-shadow:0 6px 18px rgba(2,6,23,0.4);}
.dark .btn.active{box-shadow:0 20px 50px rgba(0,0,0,0.6);}
</style>
</head>
<body>

<div class="bg-grid" id="bgGrid"></div>
<div class="spot" id="spot"></div>

<div class="container">
<header>
<h1>✨ Trigonometrik Hesaplayıcı</h1>
<div class="controls">
  <button id="themeToggle" class="btn">🌙 Tema</button>
</div>
</header>

<div class="func-row" id="funcRow">
  <button class="btn active" data-f="sin">sin</button>
  <button class="btn" data-f="cos">cos</button>
  <button class="btn" data-f="tan">tan</button>
  <button class="btn" data-f="cosec">cosec</button>
  <button class="btn" data-f="sec">sec</button>
  <button class="btn" data-f="cot">cot</button>
</div>

<div class="main">
  <div class="plot-card">
    <canvas id="plotCanvas" width="800" height="320"></canvas>
    <div style="margin-top:10px;display:flex;align-items:center;gap:8px;">
      <label>Açı:</label>
      <input id="angle" type="number" value="30"/>
      <div class="unit-toggle">
        <button id="degBtn" class="btn active">°</button>
        <button id="radBtn" class="btn">rad</button>
      </div>
    </div>
    <input id="angleRange" type="range" min="-360" max="360" step="0.1" value="30" style="width:100%;margin-top:10px">
  </div>

  <div class="side">
    <div style="display:flex;gap:8px">
      <button id="calcBtn" class="calc-btn">Hesapla ✨</button>
      <button id="histBtn" class="btn">📜</button>
    </div>
    <div class="result" id="result">
      <div class="exact" id="exact">—</div>
      <div class="approx" id="approx">Sonuç burada görünecek.</div>
    </div>
  </div>
</div>
</div>

<script>
// === Spot light ===
const spot = document.getElementById('spot');
document.addEventListener('mousemove', e => { spot.style.setProperty('--spot-x', e.clientX+'px'); spot.style.setProperty('--spot-y', e.clientY+'px'); });

// === Theme toggle ===
const themeToggle = document.getElementById('themeToggle');
themeToggle.addEventListener('click', ()=>{document.documentElement.classList.toggle('dark');});

// === Elements refs ===
const angleInput=document.getElementById('angle');
const angleRange=document.getElementById('angleRange');
const degBtn=document.getElementById('degBtn');
const radBtn=document.getElementById('radBtn');
const funcButtons=Array.from(document.querySelectorAll('.func-row .btn'));
const calcBtn=document.getElementById('calcBtn');
const exactEl=document.getElementById('exact');
const approxEl=document.getElementById('approx');
const histBtn=document.getElementById('histBtn');

let currentFunc='sin';
let unit='deg';
let history=JSON.parse(localStorage.getItem('trig_history_v2')||'[]');

// Function selection
funcButtons.forEach(b=>b.addEventListener('click',()=>{
  funcButtons.forEach(x=>x.classList.remove('active'));
  b.classList.add('active');
  currentFunc=b.dataset.f;
  drawPlot();
}));

// Unit toggle
degBtn.addEventListener('click',()=>{unit='deg';degBtn.classList.add('active');radBtn.classList.remove('active');syncInputs();drawPlot();});
radBtn.addEventListener('click',()=>{unit='rad';radBtn.classList.add('active');degBtn.classList.remove('active');syncInputs();drawPlot();});

// Sync input and range
angleInput.addEventListener('input',()=>{syncRange();drawPlot();});
angleRange.addEventListener('input',()=>{syncInputs(true);drawPlot();});
function syncRange(){ const val=angleInput.value||0; angleRange.value=(unit==='deg')?val:(val*180/Math.PI); }
function syncInputs(fromRange){ if(fromRange){ const v=Number(angleRange.value); angleInput.value=(unit==='deg')?v:(v*Math.PI/180);} else{syncRange();}}

// Compute trig
function computeTrigValue(fn, rad){
  switch(fn){
    case 'sin': return Math.sin(rad);
    case 'cos': return Math.cos(rad);
    case 'tan': return Math.tan(rad);
    case 'cosec': return 1/Math.sin(rad);
    case 'sec': return 1/Math.cos(rad);
    case 'cot': return 1/Math.tan(rad);
  }
}

// Show result
function showResult(val){
  exactEl.textContent='—';
  approxEl.textContent=(isFinite(val)?val.toFixed(6):'Tanımsız');
}

// Calculate button
calcBtn.addEventListener('click',()=>{
  const raw=Number(angleInput.value); if(isNaN(raw)){approxEl.textContent='Geçerli sayı girin.';return;}
  const rad=(unit==='deg')?raw*Math.PI/180:raw;
  const val=computeTrigValue(currentFunc,rad);
  showResult(val);
  history.push(`${currentFunc} ${raw} ${unit} = ${isFinite(val)?val.toFixed(6):'Tanımsız'}`);
  if(history.length>80) history.shift();
  localStorage.setItem('trig_history_v2',JSON.stringify(history));
});

// History button
histBtn.addEventListener('click',()=>{ alert(history.slice().reverse().join('\n')||'Henüz geçmiş yok'); });

// Plot canvas
const plotCanvas=document.getElementById('plotCanvas');
const ctx=plotCanvas.getContext('2d');
function drawPlot(){
  const w=plotCanvas.width=plotCanvas.clientWidth*devicePixelRatio;
  const h=plotCanvas.height=240*devicePixelRatio;
  ctx.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0);
  ctx.clearRect(0,0,plotCanvas.clientWidth,240);
  const padding=32, W=plotCanvas.clientWidth-padding*2, H=200, cx=padding, cy=padding+H/2;
  // Grid
  ctx.strokeStyle='rgba(10,20,40,0.06)'; ctx.lineWidth=1;
  for(let x=0;x<=W;x+=20){ ctx.beginPath(); ctx.moveTo(cx+x,padding); ctx.lineTo(cx+x,padding+H); ctx.stroke();}
  for(let y=0;y<=H;y+=20){ ctx.beginPath(); ctx.moveTo(cx,padding+y); ctx.lineTo(cx+W,padding+y); ctx.stroke();}
  // Function
  ctx.strokeStyle='rgba(108,116,255,0.92)'; ctx.lineWidth=2; ctx.beginPath();
  const domainMin=-2*Math.PI, domainMax=2*Math.PI;
  function xToPx(x){ return cx+((x-domainMin)/(domainMax-domainMin))*W; }
  function yToPx(y){ return cy-y*H/2; }
  const steps=800;
  for(let i=0;i<=steps;i++){
    const t=domainMin+(i/steps)*(domainMax-domainMin);
    let y=computeTrigValue(currentFunc,t);
    if(!isFinite(y)){ctx.moveTo(xToPx(t),yToPx(0));continue;}
    const px=xToPx(t), py=yToPx(Math.max(-3,Math.min(3,y)));
    if(i===0) ctx.moveTo(px,py); else ctx.lineTo(px,py);
  }
  ctx.stroke();
  // Marker
  const angleVal=Number(angleInput.value)||0;
  const angleRad=(unit==='deg')?angleVal*Math.PI/180:angleVal;
  ctx.fillStyle='#ff6b6b'; ctx.beginPath(); ctx.arc(xToPx(angleRad),yToPx(Math.max(-3,Math.min(3,computeTrigValue(currentFunc,angleRad)))),6,0,Math.PI*2); ctx.fill();
}
drawPlot();
window.addEventListener('resize',drawPlot);
angleInput.addEventListener('input',drawPlot);
angleRange.addEventListener('input',drawPlot);
</script>
</body>
</html>
